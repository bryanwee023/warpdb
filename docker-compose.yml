services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - warpdb-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 5s
      retries: 5

  bench:
    build:
      context: .
      dockerfile: Dockerfile.bench
    command: ["--url", "http://server:8000"]
    depends_on:
      server:
        condition: service_healthy

volumes:
  warpdb-data:
